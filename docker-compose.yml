name: qwshortlink

services:
  nginx:
    image: nginx:1.30.0-alpine3.23-perl
    ports:
      - 80:80
      - 443:443
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:z
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
      - frontend_data:/app/frontend
      - staticfiles_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      - backend
      - frontend

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt

  frontend:
    image: qwshortlink-frontend
    pull_policy: never
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - ./frontend/.env
    volumes:
      - frontend_data:/app/dist
    command: npm run build

  backend:
    image: qwshortlink-backend
    container_name: qwshortlink-backend
    pull_policy: never
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    volumes:
      - staticfiles_data:/app/staticfiles
      - media_data:/app/media
    command: sh -c "python3 manage.py migrate && gunicorn config.wsgi --workers 2 --bind 0.0.0.0:5555"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery:
        condition: service_started

  celery:
    image: qwshortlink-backend
    container_name: qwshortlink-celery
    pull_policy: never
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - ./backend/.env
    command: celery -A config worker -l INFO

  celery_beat:
    image: qwshortlink-backend
    container_name: qwshortlink-celery-beat
    pull_policy: never
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - ./backend/.env
    command: celery -A config beat -l INFO
    depends_on:
      db:
        condition: service_healthy
      celery:
        condition: service_started
      backend:
        condition: service_started

  db:
    image: postgres:18.3-trixie
    container_name: qwshortlink-db
    restart: always
    shm_size: 128mb
    env_file:
      - ./db/.env
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8.6.2-trixie
    container_name: qwshortlink-redis
    restart: always
    env_file:
      - ./redis/.env
    volumes:
      - ./redis:/usr/local/etc/redis:z
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  db_data:
  frontend_data:
  staticfiles_data:
  media_data:
  certbot_webroot:
  certbot_certs:
