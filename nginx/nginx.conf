worker_processes 1;

events {
    worker_connections 1024;
}


http {
    include mime.types;
    sendfile on;

    server {
        listen 80;
    	listen [::]:80;

    	server_name qwsl.click;
    	server_tokens off;

    	location /.well-known/acme-challenge/ {
            root /var/www/certbot;
    	}

    	location / {
            return 301 https://qwsl.click$request_uri;
    	}
    }

    server {
        listen 443 default_server ssl;
    	listen [::]:443 ssl;

    	server_name qwsl.click;
	
	client_max_body_size 4G;

    	ssl_certificate /etc/letsencrypt/live/qwsl.click/fullchain.pem;
    	ssl_certificate_key /etc/letsencrypt/live/qwsl.click/privkey.pem;

	location /api/ {
	    proxy_pass http://backend:5555/api/;
	    proxy_set_header Host $host;
	    proxy_set_header X-Real-IP $remote_addr;
	    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	    proxy_set_header X-Forwarded-Proto $scheme;
	}

    	location /admin/ {
	    proxy_pass http://backend:5555/admin/;
	    proxy_set_header Host $host;
	    proxy_set_header X-Real-IP $remote_addr;
	    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	    proxy_set_header X-Forwarded-Proto $scheme;
    	}

	location /static/ {
	    alias /app/staticfiles/;
	}

	location /media/ {
	    alias /app/media/;
	}

	location / {
	    root /app/frontend;
	    try_files $uri /index.html;
	}
    }
}
